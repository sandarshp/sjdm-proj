        // Full function with updated logic for PosNeg (covering 12 bins) and standard logic for PosPos and NegNeg
        function binAndSamplePairsRelaxedAndBalanced(allPairs) {
            const bins = [
                { min: 0, max: 33 },
                { min: 34, max: 66 },
                { min: 67, max: 100 }
            ];

            const finalSelectedPairs = {
                PosPos: [],
                NegNeg: [],
                PosNeg: []
            };

            const seenPairKeys = new Set();
            const globalWordUseCount = {};
            const wordUsePerCondition = {
                PosPos: {},
                NegNeg: {},
                PosNeg: {}
            };

            function getPairKey(pair) {
                const sorted = [pair.word1, pair.word2].sort();
                return `${sorted[0]}::${sorted[1]}`;
            }

            function binIndex(value) {
                for (let i = 0; i < bins.length; i++) {
                    if (value >= bins[i].min && value <= bins[i].max) return i;
                }
                return -1;
            }

            function canUseWords(pair, cond) {
                for (let word of [pair.word1, pair.word2]) {
                    if ((globalWordUseCount[word] || 0) >= 4) return false;
                    if ((wordUsePerCondition[cond][word] || 0) >= 4) return false; //maybe this is redundant
                }
                return true;
            }

            function incrementWordCounts(pair, cond) {
                for (let word of [pair.word1, pair.word2]) {
                    globalWordUseCount[word] = (globalWordUseCount[word] || 0) + 1;
                    wordUsePerCondition[cond][word] = (wordUsePerCondition[cond][word] || 0) + 1;
                }
            }

            const binLogs = {
                PosPos: { L_R: [0, 0, 0], R_L: [0, 0, 0] },
                NegNeg: { L_R: [0, 0, 0], R_L: [0, 0, 0] },
                PosNeg: {
                    L_R: { Pos_Neg: [0, 0, 0], Neg_Pos: [0, 0, 0] },
                    R_L: { Pos_Neg: [0, 0, 0], Neg_Pos: [0, 0, 0] }
                }
            };

            function addPairToFinal(condition, pair) {
                pair.condition = condition;
                finalSelectedPairs[condition].push(pair);
                seenPairKeys.add(getPairKey(pair));
                incrementWordCounts(pair, condition);
            }

            function sampleSymmetric(condition, filteredPairs) {
                for (let direction of ['L_R', 'R_L']) {
                    for (let binIdx = 0; binIdx < bins.length; binIdx++) {
                        let needed = 4;
                        let added = 0;
                        for (let pair of jsPsych.randomization.shuffle(filteredPairs)) {
                            const key = getPairKey(pair);
                            if (seenPairKeys.has(key)) continue;
                            if (!canUseWords(pair, condition)) continue;

                            const diff = pair.rating1 - pair.rating2;
                            const bin = binIndex(Math.abs(diff));
                            if (bin !== binIdx) continue;

                            const isLR = (direction === 'L_R' && diff > 0);
                            const isRL = (direction === 'R_L' && diff < 0);
                            if (!isLR && !isRL) continue;

                            addPairToFinal(condition, pair);
                            binLogs[condition][direction][binIdx]++;
                            added++;
                            if (added === needed) break;
                        }
                    }
                }
            }

            function samplePosNeg(posNegPairs) {
                const MAX_PER_SUBTYPE = 2;

                for (let direction of ['L_R', 'R_L']) {
                    for (let binIdx = 0; binIdx < bins.length; binIdx++) {
                        let subTypeCounts = { Pos_Neg: 0, Neg_Pos: 0 };

                        for (let pair of jsPsych.randomization.shuffle(posNegPairs)) {
                            const key = getPairKey(pair);
                            if (seenPairKeys.has(key)) continue;
                            if (!canUseWords(pair, 'PosNeg')) continue;

                            const isLR = direction === 'L_R';
                            const diff = isLR ? pair.rating1 - pair.rating2 : pair.rating2 - pair.rating1;
                            if (diff <= 0 || binIndex(diff) !== binIdx) continue;

                            // Determine positive and negative word
                            const posRating = pair.valence1 === 'positive' ? pair.rating1 : pair.rating2;
                            const negRating = pair.valence1 === 'negative' ? pair.rating1 : pair.rating2;
                            const isPosNeg = posRating > negRating;
                            const subDir = isPosNeg ? 'Pos_Neg' : 'Neg_Pos';

                            // Enforce subtype max
                            if (subTypeCounts[subDir] >= MAX_PER_SUBTYPE) continue;

                            // Add trial
                            addPairToFinal('PosNeg', pair);
                            binLogs['PosNeg'][direction][subDir][binIdx]++;
                            subTypeCounts[subDir]++;

                            // Stop once both subtypes are satisfied
                            if (
                                subTypeCounts['Pos_Neg'] === MAX_PER_SUBTYPE &&
                                subTypeCounts['Neg_Pos'] === MAX_PER_SUBTYPE
                            ) break;
                        }
                    }
                }
            }


            const posPosPairs = allPairs.filter(p => p.valence1 === 'positive' && p.valence2 === 'positive');
            const negNegPairs = allPairs.filter(p => p.valence1 === 'negative' && p.valence2 === 'negative');
            const posNegPairs = allPairs.filter(p => (p.valence1 === 'positive' && p.valence2 === 'negative') || (p.valence1 === 'negative' && p.valence2 === 'positive'));

            sampleSymmetric('PosPos', posPosPairs);
            sampleSymmetric('NegNeg', negNegPairs);
            samplePosNeg(posNegPairs);

            function matchesCond(p, cond) {
                if (cond === 'PosPos') return p.valence1 === 'positive' && p.valence2 === 'positive';
                if (cond === 'NegNeg') return p.valence1 === 'negative' && p.valence2 === 'negative';
                return p.valence1 !== p.valence2; // PosNeg
            }


            // Fallback
            for (let cond of ['PosPos', 'NegNeg', 'PosNeg']) {
                const needed = 24 - finalSelectedPairs[cond].length;
                if (needed > 0) {
                    const fallback = jsPsych.randomization.shuffle(
                        allPairs.filter(p => {
                            const key = getPairKey(p);
                            return !seenPairKeys.has(key) && matchesCond(p, cond) && canUseWords(p, cond);
                        })
                    ).slice(0, needed);
                    fallback.forEach(p => addPairToFinal(cond, p));
                }
            }

            // ---------- Logging ----------
            console.log("===== Pairing Bin Summary =====");
            for (let cond of ['PosPos', 'NegNeg']) {
                console.log(`\n${cond}`);
                ['L_R', 'R_L'].forEach(dir => {
                    bins.forEach((b, i) => {
                        console.log(`${dir} Bin ${b.min}-${b.max}: ${binLogs[cond][dir][i]} trials`);
                    });
                });
            }
            console.log("\nPosNeg");
            ['L_R', 'R_L'].forEach(dir => {
                ['Pos_Neg', 'Neg_Pos'].forEach(sub => {
                    bins.forEach((b, i) => {
                        console.log(`${dir} ${sub} Bin ${b.min}-${b.max}: ${binLogs.PosNeg[dir][sub][i]} trials`);
                    });
                });
            });

            return finalSelectedPairs;
        }


        let constructPairings = {
            type: jsPsychCallFunction,
            func: function () {
                try {
                    let cleanedRatings = jsPsych.data.get().filter({ which_experiment_phase: "ratings" }).values().map(trial => ({

                    if (cleanedRatings.length === 0) {

                    }

                    let selectedPairs = binAndSamplePairsRelaxedAndBalanced(allPairs);
                    console.log('Selected Pairs PosPos', selectedPairs.PosPos.length);
                    console.log('Selected Pairs NegNeg', selectedPairs.NegNeg.length)
                    console.log('Selected Pairs PosNeg', selectedPairs.PosNeg.length)


                    // ------------------- First 16 Trials (Sum constraint + fallback) -------------------
                    function filterBySum(pairs, minSum = 80, maxSum = 120) {
                        return pairs.filter(p => {
                            const sum = p.rating1 + p.rating2;
                            return sum >= minSum && sum <= maxSum;
                        });
                    }

                    let filteredPosPos = filterBySum(selectedPairs.PosPos);
                    let filteredNegNeg = filterBySum(selectedPairs.NegNeg);

                    // Log how many trials met the constraint
                    console.log(`[PosPos] Trials meeting sum constraint (80–120): ${filteredPosPos.length}`);
                    console.log(`[NegNeg] Trials meeting sum constraint (80–120): ${filteredNegNeg.length}`);


                    let posPos8 = jsPsych.randomization.shuffle(filteredPosPos).slice(0, 8);
                    let negNeg8 = jsPsych.randomization.shuffle(filteredNegNeg).slice(0, 8);

                    // Fallback if not enough sum-constrained trials
                    if (posPos8.length < 8) {
                        const fallback = jsPsych.randomization.shuffle(
                            selectedPairs.PosPos.filter(p => !posPos8.includes(p))
                        ).slice(0, 8 - posPos8.length);
                        posPos8 = posPos8.concat(fallback);
                    }

                    if (negNeg8.length < 8) {
                        const fallback = jsPsych.randomization.shuffle(
                            selectedPairs.NegNeg.filter(p => !negNeg8.includes(p))
                        ).slice(0, 8 - negNeg8.length);
                        negNeg8 = negNeg8.concat(fallback);
                    }

                    let first16 = jsPsych.randomization.shuffle(posPos8.concat(negNeg8));


                    // Next 8: PosNeg with smallest rating difference
                    let posNegSorted = selectedPairs.PosNeg
                        .slice()
                        .sort((a, b) => a.abs_diff - b.abs_diff);

                    console.log("First 8 PosNeg sorted trials:", posNegSorted.slice(0, 8).map(p => p.condition));

                    let next8 = posNegSorted.slice(0, 8);

                    // Remaining 48: Remove anything used already
                    let first24 = [...first16, ...next8];
                    let remainingPool = selectedPairs.PosPos
                        .concat(selectedPairs.NegNeg)
                        .concat(selectedPairs.PosNeg)
                        .filter(p => !first24.includes(p));
                    let remaining48 = jsPsych.randomization.shuffle(remainingPool).slice(0, 48);

                    // Final sequence of trials
                    let reorderedFinalPairs = first16.concat(next8).concat(remaining48);


                    console.log("Missing condition on final pairs:", reorderedFinalPairs.filter(p => !p.condition));


                    let finalTrials = reorderedFinalPairs.map((pair, idx) => {

                        // 🔍 Sanity check for missing/invalid condition
                        if (!['PosPos', 'NegNeg', 'PosNeg'].includes(pair.condition)) {
                            console.warn(`Invalid or missing condition for trial ${idx + 1}`, pair);
                        }

                        // 🔍 Check if PosNeg is incorrectly made of same-valence words
                        if (
                            pair.condition === "PosNeg" &&
                            ((pair.valence1 === 'positive' && pair.valence2 === 'positive') ||
                                (pair.valence1 === 'negative' && pair.valence2 === 'negative'))
                        ) {

                                left: pair.word1, val1: pair.valence1,
                                right: pair.word2, val2: pair.valence2
                            });
                        }

                        return {
                            trial_number: idx + 1,
                            left_stim: pair.word1,
                            right_stim: pair.word2,
                            left_rating: pair.rating1,
                            right_rating: pair.rating2,
                            left_valence: pair.valence1,
                            right_valence: pair.valence2,
                            valence:
                                pair.valence1 === "positive" && pair.valence2 === "positive"
                                    ? "PosPos"
                                    : pair.valence1 === "negative" && pair.valence2 === "negative"
                                        ? "NegNeg"
                                        : "PosNeg",
                            abs_diff: pair.abs_diff,
                            which_experiment_phase: "pairing"
                        };
                    });

                    console.log("First 16 conditions:", finalTrials.slice(0, 16).map(t => t.valence));
                    console.log("Next 8 conditions:", finalTrials.slice(16, 24).map(t => t.valence));

                    const valenceCounts = finalTrials.reduce((acc, trial) => {
                        acc[trial.valence] = (acc[trial.valence] || 0) + 1;
                        return acc;
                    }, {});
                    console.log(" Reconstructed valence counts from finalTrials:", valenceCounts);

                    if (finalTrials.length === 0) {
                        console.error("No final trials generated.");
                        jsPsych.resumeExperiment();
                        return;
                    }

                    console.log("Final pairing trials generated:", finalTrials.length);
                    console.log("First 16 (PosPos/NegNeg):", first16.length);
                    console.log("Next 8 (lowest PosNeg diffs):", next8.map(p => p.abs_diff));
                    console.log("Remaining 48:", remaining48.length);

                    // For the Recog trials


                    // Utility: get rating for a word from cleanedRatings
                    function getRating(word) {
                        const entry = cleanedRatings.find(r => r.word === word);
                        return entry ? entry.rating : null;
                    }

                    // Utility: bin index
                    function getRatingBin(rating) {
                        if (rating >= 0 && rating <= 33) return 0;
                        if (rating >= 34 && rating <= 66) return 1;
                        if (rating >= 67 && rating <= 100) return 2;
                        return -1;
                    }

                    // Function to get 20 words with bin constraints or fallback
                    function sampleWordsByBinConstraint(uniqueWords, repeatWords, nTarget = 20) {
                        const bins = { 0: [], 1: [], 2: [] };
                        uniqueWords.forEach(word => {
                            const rating = getRating(word);
                            const bin = getRatingBin(rating);
                            if (bin !== -1) bins[bin].push(word);
                        });

                        const binTargets = { 0: 7, 1: 6, 2: 7 };
                        const canSatisfy = Object.entries(binTargets).every(([bin, count]) => bins[bin].length >= count);

                        if (canSatisfy) {
                            // Ideal case: sample exact bin counts
                            const final = []
                                .concat(jsPsych.randomization.shuffle(bins[0]).slice(0, 7))
                                .concat(jsPsych.randomization.shuffle(bins[1]).slice(0, 6))
                                .concat(jsPsych.randomization.shuffle(bins[2]).slice(0, 7));
                            return final;
                        }

                        // Log fallback situation
                        console.log("Could not meet bin constraint — falling back.");
                        console.log("Available unique words per bin:");
                        console.log("Low (0–33):", bins[0].length);
                        console.log("Mid (34–66):", bins[1].length);
                        console.log("High (67–100):", bins[2].length);

                        // Step 1: Take all unique binned words
                        let final = bins[0].concat(bins[1]).concat(bins[2]);

                        // Step 2: Fill from remaining unique (not yet used)
                        const binnedSet = new Set(final);
                        const remainingUnique = uniqueWords.filter(w => !binnedSet.has(w));
                        final = final.concat(jsPsych.randomization.shuffle(remainingUnique));

                        // Step 3: Fill with repeats if still short
                        if (final.length < nTarget) {
                            final = final.concat(jsPsych.randomization.shuffle(repeatWords));
                        }

                        // Final safety cap
                        return final.slice(0, nTarget);
                    }

                    // ==== STEP 1: Count appearances in pairings ====
                    let wordCount = {};
                    reorderedFinalPairs.forEach(pair => {
                        [pair.word1, pair.word2].forEach(word => {
                            wordCount[word] = (wordCount[word] || 0) + 1;
                        });
                    });

                    // ==== STEP 2: Separate old words by valence ====
                    let allOldPos = [];
                    let allOldNeg = [];

                    Object.keys(wordCount).forEach(word => {
                        if (posWords.includes(word)) allOldPos.push(word);
                        else if (negWords.includes(word)) allOldNeg.push(word);
                    });

                    // ==== STEP 3: Separate unique and repeat words ====
                    let uniqueOldPos = allOldPos.filter(w => wordCount[w] === 1);
                    let uniqueOldNeg = allOldNeg.filter(w => wordCount[w] === 1);
                    let repeatOldPos = allOldPos.filter(w => wordCount[w] > 1);
                    let repeatOldNeg = allOldNeg.filter(w => wordCount[w] > 1);

                    // ==== STEP 4: Sample with bin constraint logic ====
                    const nOldPerValence = 20;

                    let finalOldPos = sampleWordsByBinConstraint(uniqueOldPos, repeatOldPos, nOldPerValence);
                    let finalOldNeg = sampleWordsByBinConstraint(uniqueOldNeg, repeatOldNeg, nOldPerValence);

                    // ==== STEP 5: Sanity check ====
                    if (finalOldPos.length < nOldPerValence || finalOldNeg.length < nOldPerValence) {
                        throw new Error("Not enough old positive or negative words for recognition phase, even with repeats.");
                    }

                    // STEP 6: New words
                    let nNew = 40;
                    let shuffledNewPos = jsPsych.randomization.shuffle(newPosWords).slice(0, nNew / 2);
                    let shuffledNewNeg = jsPsych.randomization.shuffle(newNegWords).slice(0, nNew / 2);

                    // STEP 7: Create recognition trials (no trialNumber yet)
                    let recogTrials = [];

                    finalOldPos.forEach(word => {
                        recogTrials.push({
                            stim: word,
                            answer: "old",
                            valence: "positive"
                        });
                    });
                    finalOldNeg.forEach(word => {
                        recogTrials.push({
                            stim: word,
                            answer: "old",
                            valence: "negative"
                        });
                    });
                    shuffledNewPos.forEach(word => {
                        recogTrials.push({
                            stim: word,
                            answer: "new",
                            valence: "positive"
                        });
                    });
                    shuffledNewNeg.forEach(word => {
                        recogTrials.push({
                            stim: word,
                            answer: "new",
                            valence: "negative"
                        });
                    });

                    // STEP 8: Shuffle and assign trial numbers

                    shuffledRecogArray.forEach((trial, idx) => {
                        trial.trialNumber = idx + 1;

                    data.participant_response = "new"
                }

                if (data.true_answer === data.participant_response) {
                    data.correct = true
                } else {
                    data.correct = false
                }

                let validResp = false;
                if (data.response === "y" || data.response === "n") {
                    validResp = true
                }
                data.valid_response = validResp;
            }
        };

        var recog_feedback = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            trial_duration: 1000,
            response_ends_trial: false,
            on_start: (feedbackTrial) => {
                let curr_data = jsPsych.data.getLastTrialData().trials[0];

                if (curr_data.rt === null) {
                    feedbackTrial.stimulus = `<p style="font-size: 24px; font-weight: bold;">RESPOND FASTER!</p>`
                } else if (curr_data.correct) {
                    feedbackTrial.stimulus = `<p style="font-size: 24px; font-weight: bold; color: green;">Correct!</p>`
                } else {
                    feedbackTrial.stimulus = `<p style="font-size: 24px; font-weight: bold; color: red;">Wrong!</p>`
                }
            }
        }

        var single_prac_recog = {
            timeline: [fixation, recog_trial, recog_feedback],
        };

        var prac_recog_block = {
            timeline: [single_prac_recog],
            timeline_variables: shuffledPracRecogArray,
            data: { which_experiment_phase: 'prac_recog' }
        };

        let consecutiveRecogTimeouts = 0;
        let showedRecogWarning = false;
        let lastRecogTimeoutStatus = "continue";
        let totalRecogTimeouts = 0;


        function checkRecogTimeoutLogic() {
            const last = jsPsych.data.get().last(2).values()[0]; // get recog_trial data
            if (last.valid_response === false) {
                consecutiveRecogTimeouts++;
                totalRecogTimeouts++;
            } else {
                consecutiveRecogTimeouts = 0;
            }

            if (consecutiveRecogTimeouts === 4 && !showedRecogWarning) {
                showedRecogWarning = true;
                return "warning";
            }

            if (consecutiveRecogTimeouts >= 8 || totalRecogTimeouts >= 15) {
                return "terminate";
            }

            return "continue";
        }

        var handle_recog_timeout = {
            conditional_function: () => {
                return lastRecogTimeoutStatus === "warning";
            },
            timeline: [timeout_warning]
        };

        var handle_recog_termination = {
            conditional_function: () => {
                if (lastRecogTimeoutStatus === "terminate") {
                    jsPsych.endExperiment('You had too many missed responses. The experiment has ended.');
                }
                return false;
            },
            timeline: []
        };
        var single_recog = {
            timeline: [
                fixation,
                recog_trial,
                timeout,
                {
                    timeline: [],
                    on_timeline_start: () => {
                        lastRecogTimeoutStatus = checkRecogTimeoutLogic();
                    }
                },
                handle_recog_timeout,
                handle_recog_termination
            ]
        };
        // ################ NEW RATINGS ##########

        var sliderVals2 = [];

        for (var i = 0; i <= 100; i++) {
            sliderVals2.push(i);
        };

        var new_rating_trial = {
            type: jsPsychHtmlSliderResponse,
            stimulus: function () {
                let stim = jsPsych.timelineVariable('stim')
                return `<p style="font-size:100px">${stim}</p>
					<p style="font-size:40px">Describes you?</p>`
            },
            labels: [
                '<div style="font-size: 24px;">0 (Not at all)</div>',
                '<div style="font-size: 24px;">100 (Perfectly)</div>'
            ],
            slider_width: 800,
            slider_start: function () {
                let val = jsPsych.randomization.repeat(sliderVals2, 1).pop();

                return val
            },
            require_movement: true,
            data: {
                which_experiment_phase: "new_ratings",
                word_used: jsPsych.timelineVariable('stim'),
                valence: jsPsych.timelineVariable('valence'),
                trial_number: jsPsych.timelineVariable('trialNumber')
            },
        };

        var new_rating_block = {
            timeline: [fixation, new_rating_trial],
            timeline_variables: shuffledNewRatingsArray,
            data: { which_experiment_phase: 'new_ratings' }
        };

        /* create timelines */

        var main_timeline = [
            pavlovia_init,
            consent_page,
            //phq9_survey,
            //mental_health_resources,       // Always shown 
            //check_phq_eligibility,         // Ends the experiment if needed
            welcome,
            ratings_instructs,
            countdown,
            rating_block_first_half,
            midwayMessage,
            rating_block_second_half,
            finalQuarterMessage,
            rating_block_final_quarter,
            constructPairings // dynamically adds everything after ratings
        ];

        var mini_timeline = [
            pavlovia_init,
            engagement_question, 
            accuracy_question, 
            strategy_used_prompt,
            pavlovia_finish
        ]

        console.log("Is pairing_block ready?", window.pairing_block);

        jsPsych.run(main_timeline);
        //jsPsych.run(mini_timeline);


    </script>
</body>
